name: noor_beauty_app
description: Noor Beauty Salon - Beauty and wellness booking app for Dhaka, Bangladesh.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  jwt_decoder: ^2.0.1
  shared_preferences: ^2.2.0
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  provider: ^6.0.0
  intl: ^0.19.0
  otp: ^3.0.0
  qr_flutter: ^4.1.0
  image_picker: ^1.0.0
  table_calendar: ^3.0.9
  flutter_local_notifications: ^19.5.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/OpenSans-Light.ttf
          weight: 300

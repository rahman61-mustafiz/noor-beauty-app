name: noor_beauty_app
description: Noor Beauty Salon - Beauty and wellness booking app for Dhaka, Bangladesh.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  jwt_decoder: ^2.0.1
  shared_preferences: ^2.2.0
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  provider: ^6.0.0
  intl: ^0.19.0
  image_picker: ^1.0.0
  table_calendar: ^3.0.9
  flutter_local_notifications: ^19.5.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.0
  in_app_review: ^2.0.12
  fl_chart: ^0.66.0
  crypto: ^3.0.3
  confetti: ^0.7.0
  video_player: ^2.11.1
  marquee: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/OpenSans-Light.ttf
          weight: 300
